name: CI

on:
  push:
    branches:
      - main
      - cheeeee/fork-cicd
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
  pull_request: {}
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repo-checks:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv python install
      - uses: extractions/setup-just@v2
      # Need this because we're running `cargo clippy` and `fmt`
      # directly.
      - uses: dsherret/rust-toolchain-file@v1
      - name: Install cbfmt
        run: |
            mkdir /tmp/cbfmt && cd $_
            curl -fsSL -o cbfmt.tar.gz "https://github.com/lukas-reineke/cbfmt/releases/download/v0.2.0/cbfmt_linux-x86_64_v0.2.0.tar.gz"
            tar --strip-components 1 -xvf cbfmt.tar.gz
            mkdir -p "$HOME/.local/bin"
            mv cbfmt "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Prep venv
        shell: bash
        run: |
          uv venv -p 3.12 venv
          . venv/bin/activate
          uv pip sync --strict requirements/dev.txt
      - name: Check pre-commit hooks
        shell: bash
        run: |
          . venv/bin/activate
          just lint-pc
      - name: Run lints
        shell: bash
        run: |
          . venv/bin/activate
          just lint
      - name: Run Rust tests
        shell: bash
        run: |
          . venv/bin/activate
          just test-rs
      - name: Run documentation tests
        shell: bash
        run: |
          . venv/bin/activate
          just test-doc

  linux:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        target: ['x86_64', 'aarch64', 'armv7']
    runs-on: [self-hosted, Linux, X64]
    # Kafka service container for integration tests (KRaft mode, no Zookeeper).
    # Requires Docker on the runner. Commented out for self-hosted runners
    # without Docker. Kafka tests will be skipped (TEST_KAFKA_BROKER not set).
    # Uncomment when Docker is available on the runner.
    #
    # services:
    #   kafka:
    #     image: confluentinc/cp-kafka:7.7.1
    #     ports:
    #       - 9092:9092
    #     env:
    #       KAFKA_NODE_ID: 1
    #       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    #       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    #       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
    #       KAFKA_PROCESS_ROLES: broker,controller
    #       KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
    #       KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    #       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    #       KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    #       KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    #       CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    #       KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv python install
      - run: echo "$(dirname $(uv python find))" >> $GITHUB_PATH
      - uses: extractions/setup-just@v2
      - name: Ensure Rust toolchain
        shell: bash
        run: |
          if ! command -v rustup &> /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
          sccache: true
      - name: Run Python tests
        # Only run tests for the host architecture, as aarch64 and
        # armv7 are cross-compiled on Ubuntu runners.
        # Kafka tests skipped when TEST_KAFKA_BROKER is not set
        # (requires Docker service container).
        if: ${{ matrix.target == 'x86_64' }}
        shell: bash
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

