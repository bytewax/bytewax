name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
  pull_request: {}
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
          python-version: "3.12"
          activate-environment: true
          venv-path: venv
      - uses: extractions/setup-just@v2
      # Need this because we're running `cargo clippy` and `fmt`
      # directly.
      - uses: dsherret/rust-toolchain-file@v1
      - name: Install cbfmt
        run: |
            mkdir /tmp/cbfmt && cd $_
            curl -fsSL -o cbfmt.tar.gz "https://github.com/lukas-reineke/cbfmt/releases/download/v0.2.0/cbfmt_linux-x86_64_v0.2.0.tar.gz"
            tar --strip-components 1 -xvf cbfmt.tar.gz
            mv cbfmt /usr/local/bin/
      - name: Prep venv
        shell: bash
        run: uv pip sync --strict requirements/dev.txt
      - name: Check pre-commit hooks
        shell: bash
        run: just lint-pc
      - name: Run lints
        shell: bash
        run: just lint
      - name: Run Rust tests
        shell: bash
        run: just test-rs
      - name: Run documentation tests
        shell: bash
        run: just test-doc

  linux:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        target: ['x86_64', 'aarch64', 'armv7']
        include:
          - target: x86_64
            runs-on: ubuntu-24.04
          - target: aarch64
            runs-on: ubuntu-24.04-arm
          - target: armv7
            runs-on: ubuntu-24.04
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
          sccache: true
      # Native test path (x86_64 + aarch64): JVM Kafka tarball started
      # locally via scripts/ci-kafka.sh, then pytest runs in the host
      # venv against it. Same script reused on every platform.
      - name: Cache Apache Kafka tarball
        if: ${{ matrix.target == 'x86_64' || matrix.target == 'aarch64' }}
        uses: actions/cache@v4
        with:
          path: .kafka
          key: kafka-3.8.0-${{ runner.os }}-${{ matrix.target }}
      - name: Start Kafka
        if: ${{ matrix.target == 'x86_64' || matrix.target == 'aarch64' }}
        shell: bash
        run: ./scripts/ci-kafka.sh start
      - name: Run Python tests
        if: ${{ matrix.target == 'x86_64' || matrix.target == 'aarch64' }}
        shell: bash
        env:
          TEST_KAFKA_BROKER: localhost:9092
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl | head -n1)
          uv pip install -v --no-deps "$WHEEL_FILE"
          just test-py
      - name: Stop Kafka
        if: ${{ always() && (matrix.target == 'x86_64' || matrix.target == 'aarch64') }}
        shell: bash
        run: ./scripts/ci-kafka.sh stop
      # armv7 has no native GH-hosted runner; run pytest + kafka under
      # qemu via uraimo/run-on-arch-action. Slow (JVM under qemu can
      # take 5+ minutes to boot) but covers the matrix.
      - name: Run Python tests + kafka under qemu (armv7)
        if: ${{ matrix.target == 'armv7' }}
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: armv7
          distro: ubuntu_latest
          githubToken: ${{ github.token }}
          dockerRunArgs: |
            --volume "${PWD}:/work"
            --workdir /work
          install: |
            apt-get update && apt-get install -y --no-install-recommends \
              default-jre-headless curl tar ca-certificates
          env: |
            TEST_KAFKA_BROKER: localhost:9092
          run: |
            # Bootstrap uv (it has armv7 builds) and use it to install
            # a Python matching the matrix version + the test deps.
            # We skip requirements/build-py*.txt because the hashed
            # pins target x86_64 wheels and would force source builds
            # of pure-deps that don't ship armv7 wheels.
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="/root/.local/bin:$PATH"
            uv venv -p ${{ matrix.python-version }} /tmp/venv
            . /tmp/venv/bin/activate
            uv pip install pytest pytest-benchmark
            uv pip install ./dist/*.whl[kafka]
            ./scripts/ci-kafka.sh start
            pytest --benchmark-skip pytests/connectors/test_kafka.py
            ./scripts/ci-kafka.sh stop
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  macos:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        target: ['x86_64', 'aarch64']
        include:
          - target: x86_64
            runs-on: macos-13            # Intel
          - target: aarch64
            runs-on: macos-latest        # Apple Silicon
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          MACOSX_DEPLOYMENT_TARGET: 10.9
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
      - name: Cache Apache Kafka tarball
        uses: actions/cache@v4
        with:
          path: .kafka
          key: kafka-3.8.0-${{ runner.os }}-${{ matrix.target }}
      - name: Start Kafka
        shell: bash
        run: ./scripts/ci-kafka.sh start
      - name: Run Python tests
        shell: bash
        env:
          TEST_KAFKA_BROKER: localhost:9092
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl | head -n1)
          uv pip install -v --no-deps "$WHEEL_FILE"
          just test-py
      - name: Stop Kafka
        if: always()
        shell: bash
        run: ./scripts/ci-kafka.sh stop
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  windows:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    runs-on: windows-latest
    steps:
      - uses: ilammy/msvc-dev-cmd@v1
      - shell: cmd
        run: |
          set PATH=%PATH%;%wix%bin;"%WindowsSdkVerBinPath%"\x86
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/Scripts/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
          sccache: true
      - name: Cache Apache Kafka tarball
        uses: actions/cache@v4
        with:
          path: .kafka
          key: kafka-3.8.0-${{ runner.os }}
      - name: Start Kafka
        shell: bash
        run: ./scripts/ci-kafka.sh start
      - name: Run Python tests
        shell: bash
        env:
          TEST_KAFKA_BROKER: localhost:9092
        run: |
          . venv/Scripts/activate
          WHEEL_FILE=$(ls ./dist/*.whl | head -n1)
          uv pip install -v --no-deps "$WHEEL_FILE"
          just test-py
      - name: Stop Kafka
        if: always()
        shell: bash
        run: ./scripts/ci-kafka.sh stop
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  upload:
    name: Store wheels in S3
    runs-on: ubuntu-24.04
    if: "github.ref == 'refs/heads/main'"
    needs: [ linux, macos, windows ]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*-*
          path: wheels
          merge-multiple: true
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECR_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ECR_SECRET_KEY }}
          aws-region: us-west-2
      - name: Upload files to S3 with AWS CLI
        run: |
          aws s3 sync ./wheels s3://${{ secrets.WHEELS_S3_BUCKET }}/${{ github.sha }} --delete
          aws s3 ls s3://${{ secrets.WHEELS_S3_BUCKET }}/${{ github.sha }}
