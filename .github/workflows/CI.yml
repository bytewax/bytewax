name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
  pull_request: {}
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
          python-version: "3.12"
          activate-environment: true
          venv-path: venv
      - uses: extractions/setup-just@v2
      # Need this because we're running `cargo clippy` and `fmt`
      # directly.
      - uses: dsherret/rust-toolchain-file@v1
      - name: Install cbfmt
        run: |
            mkdir /tmp/cbfmt && cd $_
            curl -fsSL -o cbfmt.tar.gz "https://github.com/lukas-reineke/cbfmt/releases/download/v0.2.0/cbfmt_linux-x86_64_v0.2.0.tar.gz"
            tar --strip-components 1 -xvf cbfmt.tar.gz
            mv cbfmt /usr/local/bin/
      - name: Prep venv
        shell: bash
        run: uv pip sync --strict requirements/dev.txt
      - name: Check pre-commit hooks
        shell: bash
        run: just lint-pc
      - name: Run lints
        shell: bash
        run: just lint
      - name: Run Rust tests
        shell: bash
        run: just test-rs
      - name: Run documentation tests
        shell: bash
        run: just test-doc

  linux:
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        target: ['x86_64', 'aarch64', 'armv7']
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
          sccache: true
      - name: Start Kafka
        if: ${{ matrix.target == 'x86_64' }}
        run: docker compose -f examples/utils/docker-compose.yml up -d --wait
      - name: Run Python tests
        # Only run tests for the host architecture, as aarch64 and
        # armv7 are cross-compiled on Ubuntu runners.
        if: ${{ matrix.target == 'x86_64' }}
        shell: bash
        env:
          TEST_KAFKA_BROKER: localhost:9092
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Stop Kafka
        if: ${{ always() && matrix.target == 'x86_64' }}
        run: docker compose -f examples/utils/docker-compose.yml down
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  macos:
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        target: ['x86_64', 'aarch64']
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          MACOSX_DEPLOYMENT_TARGET: 10.9
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
      # GH Apple Silicon runners do not enable nested virtualization,
      # so neither colima/VZ nor lima/QEMU can boot a Linux VM (the
      # latter fails with HV_UNSUPPORTED from Hypervisor.framework).
      # Docker is therefore unavailable on macOS GH runners and the
      # kafka integration tests cannot run here. Linux and Windows
      # still cover the same code path. Leaving TEST_KAFKA_BROKER
      # unset means the pytestmark gate in
      # pytests/connectors/test_kafka.py cleanly skips the suite.
      - name: Run Python tests
        # Only run tests for the host architecture, as x86_64 is
        # cross-compiled on macOS runners.
        if: ${{ matrix.target == 'aarch64' }}
        shell: bash
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  windows:
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    # windows-2025 (the current windows-latest) removed Docker Desktop;
    # pin to windows-2022 which still ships it pre-installed for the
    # `Switch Docker Desktop to Linux engine` step below.
    runs-on: windows-2022
    steps:
      - uses: ilammy/msvc-dev-cmd@v1
      - shell: cmd
        run: |
          set PATH=%PATH%;%wix%bin;"%WindowsSdkVerBinPath%"\x86
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          venv/Scripts/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
          sccache: true
      # Docker Desktop is no longer pre-installed on windows-2022 or
      # windows-2025; this action installs Docker (Linux containers)
      # via WSL2 backend so docker compose can run our broker.
      # Pin Docker version explicitly because the action's "latest"
      # detection constructs a wrong download URL on Windows.
      - name: Set up Docker (Windows, Linux containers via WSL2)
        uses: crazy-max/ghaction-setup-docker@v3
        with:
          version: v25.0.5
      - name: Start Kafka
        run: docker compose -f examples/utils/docker-compose.yml up -d --wait
      - name: Run Python tests
        shell: pwsh
        env:
          TEST_KAFKA_BROKER: localhost:9092
        run: |
          venv/Scripts/activate
          $WHEEL_FILE=@((gci -path dist *.whl|Resolve-path -relative) -replace "","")[0]
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Stop Kafka
        if: ${{ always() }}
        run: docker compose -f examples/utils/docker-compose.yml down
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  upload:
    name: Store wheels in S3
    runs-on: ubuntu-24.04
    if: "github.ref == 'refs/heads/main'"
    needs: [ linux, macos, windows ]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*-*
          path: wheels
          merge-multiple: true
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECR_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ECR_SECRET_KEY }}
          aws-region: us-west-2
      - name: Upload files to S3 with AWS CLI
        run: |
          aws s3 sync ./wheels s3://${{ secrets.WHEELS_S3_BUCKET }}/${{ github.sha }} --delete
          aws s3 ls s3://${{ secrets.WHEELS_S3_BUCKET }}/${{ github.sha }}
