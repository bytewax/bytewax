name: CI

on:
  push:
    branches:
      - main
      - cheeeee/fork-cicd
    tags:
      - 'v*'
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
  pull_request: {}
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pre-pull:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Pre-pull Docker images
        run: |
          docker pull alpine:latest &
          docker pull buildpack-deps:22.04 &
          docker pull ubuntu:22.04 &
          docker pull confluentinc/cp-kafka:7.7.1 &
          docker pull quay.io/pypa/manylinux2014_x86_64:latest &
          docker pull ghcr.io/rust-cross/manylinux2014-cross:aarch64 &
          docker pull ghcr.io/rust-cross/manylinux2014-cross:armv7 &
          wait
      - name: Create Docker-in-Docker path symlink
        run: |
          # Jobs running in a container use /__w/ paths. Cross-compile
          # Docker containers need this path on the HOST for bind mounts
          # to resolve via the host Docker daemon.
          # Use Docker for root access (runner user has no passwordless sudo).
          docker run --rm -v /:/host alpine sh -c '
            if [ -d /host/__w ] && [ ! -L /host/__w ]; then
              rm -rf /host/__w
            fi
            ln -sfn /opt/actions-runner/_work /host/__w
          '

  repo-checks:
    needs: pre-pull
    runs-on: [self-hosted, Linux, X64]
    # Run inside a container for clean environment and no sudo needed.
    # buildpack-deps:22.04 includes gcc, make, pkg-config, libssl-dev, git, curl.
    container:
      image: buildpack-deps:22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      # actions/checkout sets safe.directory in a temp HOME; re-set it
      # globally so git works in subsequent steps (pre-commit, etc.)
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-repo-checks-${{ hashFiles('**/Cargo.lock') }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv python install
      - uses: extractions/setup-just@v2
      # Need this because we're running `cargo clippy` and `fmt`
      # directly.
      - uses: dsherret/rust-toolchain-file@v1
      - name: Install cbfmt
        run: |
            mkdir /tmp/cbfmt && cd $_
            curl -fsSL -o cbfmt.tar.gz "https://github.com/lukas-reineke/cbfmt/releases/download/v0.2.0/cbfmt_linux-x86_64_v0.2.0.tar.gz"
            tar --strip-components 1 -xvf cbfmt.tar.gz
            mkdir -p "$HOME/.local/bin"
            mv cbfmt "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
      # Run pre-commit before compilation — fast fail on formatting issues.
      # pre-commit only needs ruff and cbfmt (already on PATH), not bytewax.
      - name: Prep pre-commit venv
        shell: bash
        run: |
          uv venv -p 3.12 venv
          . venv/bin/activate
          uv pip install pre-commit ruff
      - name: Check pre-commit hooks
        shell: bash
        run: |
          . venv/bin/activate
          just lint-pc
      # Full venv with bytewax (triggers Rust compilation via -e .)
      - name: Prep full venv
        shell: bash
        run: |
          . venv/bin/activate
          uv pip sync --strict requirements/dev.txt
      - name: Run lints
        shell: bash
        run: |
          . venv/bin/activate
          just lint
      - name: Run Rust tests
        shell: bash
        run: |
          . venv/bin/activate
          export LD_LIBRARY_PATH="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')"
          just test-rs
      - name: Run documentation tests
        shell: bash
        run: |
          . venv/bin/activate
          just test-doc
      # Container runs as root; fix ownership so later jobs (running as
      # the host runner user) can clean up the shared workspace.
      - name: Fix workspace permissions
        if: always()
        run: chmod -R a+rwX "$GITHUB_WORKSPACE"

  linux:
    needs: pre-pull
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        target: ['x86_64', 'aarch64', 'armv7']
    runs-on: [self-hosted, Linux, X64]
    container:
      image: buildpack-deps:22.04
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /usr/bin/docker:/usr/bin/docker
    # Kafka service container for integration tests (KRaft mode, no Zookeeper).
    # Only used for x86_64 tests (cross-compiled targets skip tests).
    services:
      kafka:
        image: confluentinc/cp-kafka:7.7.1
        env:
          KAFKA_NODE_ID: 1
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    steps:
      - name: Fix workspace permissions
        run: chmod -R a+rwX "${{ github.workspace }}" 2>/dev/null || true
      # maturin-action post-build runs "sudo chown" for permission fix.
      # Container runs as root so sudo is unnecessary; provide a no-op wrapper.
      - name: Create sudo wrapper
        run: printf '#!/bin/sh\nexec "$@"\n' > /usr/local/bin/sudo && chmod +x /usr/local/bin/sudo
      - uses: actions/checkout@v3
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv python install
      - run: echo "$(dirname $(uv python find))" >> $GITHUB_PATH
      - uses: extractions/setup-just@v2
      - uses: dsherret/rust-toolchain-file@v1
      - run: rustup default "$(rustup toolchain list | awk '{print $1}' | head -1)"
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
          sccache: true
      - name: Run Python tests
        if: ${{ matrix.target == 'x86_64' }}
        shell: bash
        env:
          TEST_KAFKA_BROKER: kafka:9092
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist
      - name: Fix workspace permissions
        if: always()
        run: chmod -R a+rwX "$GITHUB_WORKSPACE"

  macos:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        target: ['x86_64', 'aarch64']
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv python install
      - run: echo "$(dirname $(uv python find))" >> $GITHUB_PATH
      - uses: extractions/setup-just@v2
      - uses: dsherret/rust-toolchain-file@v1
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        with:
          target: ${{ matrix.target }}
          args: --release --out dist/ -i ${{ matrix.python-version }}
      - name: Run Python tests
        # Only run tests for the host architecture (aarch64 on macos-latest).
        # x86_64 wheels are cross-compiled; Kafka tests are skipped (no Docker).
        if: ${{ matrix.target == 'aarch64' }}
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/bin/activate
          if ! uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt; then
            echo "::warning::Dependency install failed (likely missing binary wheels). Skipping tests."
            exit 0
          fi
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: dist

  windows:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv python install
      - shell: bash
        run: echo "$(dirname $(uv python find))" >> $GITHUB_PATH
      - uses: extractions/setup-just@v2
      - uses: dsherret/rust-toolchain-file@v1
      - name: Find Python interpreter
        id: python-path
        shell: bash
        run: echo "path=$(uv python find)" >> $GITHUB_OUTPUT
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        with:
          args: --release --out dist/ -i ${{ steps.python-path.outputs.path }}
          sccache: true
      - name: Run Python tests
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv/
          . venv/Scripts/activate
          if ! uv pip sync --strict requirements/build-py${{ matrix.python-version }}.txt; then
            echo "::warning::Dependency install failed (likely missing binary wheels). Skipping tests."
            exit 0
          fi
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist

  # NOTE: S3 upload job commented out — using GitHub Actions artifacts instead.
  # Uncomment and configure AWS secrets to re-enable S3 wheel storage.
  #
  # upload:
  #   name: Store wheels in S3
  #   runs-on: ubuntu-20.04
  #   if: "github.ref == 'refs/heads/main'"
  #   needs: [ linux, macos, windows ]
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         pattern: wheels-*-*
  #         path: wheels
  #         merge-multiple: true
  #     - name: Configure AWS Credentials
  #       uses: aws-actions/configure-aws-credentials@v1
  #       with:
  #         aws-access-key-id: ${{ secrets.ECR_ACCESS_KEY }}
  #         aws-secret-access-key: ${{ secrets.ECR_SECRET_KEY }}
  #         aws-region: us-west-2
  #     - name: Upload files to S3 with AWS CLI
  #       run: |
  #         aws s3 sync ./wheels s3://${{ secrets.WHEELS_S3_BUCKET }}/${{ github.sha }} --delete
  #         aws s3 ls s3://${{ secrets.WHEELS_S3_BUCKET }}/${{ github.sha }}

  ci-pass:
    if: always()
    needs: [repo-checks, linux, macos, windows]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
