name: benchmarks

on:
  push:
    branches:
      - "main"
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmarks:
    runs-on: [self-hosted, Linux, X64]
    container:
      image: buildpack-deps:22.04
    steps:
      - name: Fix workspace permissions
        run: chmod -R a+rwX "${{ github.workspace }}" 2>/dev/null || true
      - name: Create sudo wrapper
        run: printf '#!/bin/sh\nexec "$@"\n' > /usr/local/bin/sudo && chmod +x /usr/local/bin/sudo
      - uses: actions/checkout@v3
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv python install
      - run: echo "$(dirname $(uv python find))" >> $GITHUB_PATH
      - uses: dsherret/rust-toolchain-file@v1
      - run: rustup default "$(rustup toolchain list | awk '{print $1}' | head -1)"
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p 3.12 venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py3.12.txt
      - name: Build wheel
        shell: bash
        run: |
          . venv/bin/activate
          just build
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v3
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: |
            . venv/bin/activate
            WHEEL_FILE=$(ls ./dist/*.whl)
            uv pip install -v --no-deps $WHEEL_FILE
            just test-benchmark
      - name: Fix workspace permissions
        if: always()
        run: chmod -R a+rwX "$GITHUB_WORKSPACE"
