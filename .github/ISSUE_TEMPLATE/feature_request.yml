name: ✨ Feature Request
description: Suggest an idea or improvement for Bytewax
title: "[FEATURE] "
labels: ["type:feature", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Before filing,
        please [search existing issues](https://github.com/bytewax/bytewax/issues?q=is%3Aissue)
        — there may already be a discussion or a `help wanted` label on it.

        Bytewax is now community-maintained. Well-scoped feature proposals
        with a clear use case are much more likely to find a contributor.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what's getting in the way today?
      placeholder: I'm building X and I can't currently do Y because...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? An API sketch, code snippet, or
        operator signature is great if you have one.
      placeholder: |
        ```python
        # e.g. an API sketch
        op.new_thing("step", upstream, ...)
        ```
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they don't fit.
  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      description: Best guess — helps maintainers triage.
      options:
        - Small (a few hours of work)
        - Medium (a couple of days)
        - Large (week+ / design needed)
        - Not sure
    validations:
      required: false
  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to help?
      options:
        - label: I'd be willing to open a PR for this if a maintainer agrees on the approach
        - label: I'd be willing to help test or review a PR
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, prior art, related issues — anything else useful.
