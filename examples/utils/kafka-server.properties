# Apache Kafka 3.8 broker config, ZooKeeper-coordinated, single-broker for tests.
broker.id=1

# Listeners
listeners=PLAINTEXT://0.0.0.0:9092
advertised.listeners=PLAINTEXT://localhost:9092
listener.security.protocol.map=PLAINTEXT:PLAINTEXT
inter.broker.listener.name=PLAINTEXT

# ZooKeeper
zookeeper.connect=zookeeper:2181
zookeeper.connection.timeout.ms=18000

# Logs
log.dirs=/tmp/kafka-logs
num.partitions=1
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# Test correctness: tests assert that reading from a missing topic raises;
# this requires the broker NOT to silently auto-create on first reference.
auto.create.topics.enable=false

# Single-node sanity
group.initial.rebalance.delay.ms=0
